<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORDLUXE | About</title>

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat', sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
color:#e0e0e0;
min-height:100vh;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(209,155,72,0.3);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 0 30px rgba(209,155,72,0.1);
}

.logo img{
height:45px;
transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
filter:drop-shadow(0 0 10px rgba(209,155,72,0.5));
}

.logo img:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px rgba(209,155,72,0.8));
}

nav a{
color:#e0e0e0;
text-decoration:none;
margin-left:30px;
font-size:15px;
letter-spacing:1px;
font-weight:500;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position:relative;
}

nav a::before{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:linear-gradient(90deg, #d19b48, #ffd700);
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

nav a:hover{
color:#ffd700;
transform:translateY(-2px);
}

nav a:hover::before{
width:100%;
}

.cart-btn{
background:linear-gradient(135deg, #d19b48 0%, #ffd700 100%) !important;
color:#000 !important;
padding:10px 20px !important;
border-radius:25px !important;
font-weight:600 !important;
font-size:14px !important;
letter-spacing:0.5px !important;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
box-shadow:0 4px 15px rgba(209,155,72,0.3) !important;
border:1px solid rgba(255,215,0,0.2) !important;
}

.cart-btn:hover{
background:linear-gradient(135deg, #ffd700 0%, #d19b48 100%) !important;
transform:scale(1.05) translateY(-2px) !important;
box-shadow:0 8px 25px rgba(209,155,72,0.5) !important;
}

/* ABOUT */

.about{
display:flex;
flex-wrap:wrap;
gap:60px;
padding:100px 60px;
align-items:center;
justify-content:center;
background:linear-gradient(135deg, rgba(26,26,46,0.3) 0%, rgba(22,33,62,0.3) 100%);
backdrop-filter:blur(10px);
border-top:1px solid rgba(209,155,72,0.1);
border-bottom:1px solid rgba(209,155,72,0.1);
}

.about img{
width:300px;
border-radius:50%;
border:3px solid #d19b48;
box-shadow:0 0 30px rgba(209,155,72,0.3);
transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.about img:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(209,155,72,0.5);
}

.about-text{
max-width:550px;
line-height:1.8;
color:#e0e0e0;
}

.about-text h2{
font-size:36px;
margin-bottom:30px;
color:#fff;
font-weight:700;
text-shadow:0 0 20px rgba(209,155,72,0.3);
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
border-top:1px solid rgba(209,155,72,0.3);
}

footer p{
margin-bottom:15px;
color:#e0e0e0;
font-weight:300;
}

footer a{
color:#d19b48;
text-decoration:none;
font-weight:500;
transition:all 0.3s ease;
}

footer a:hover{
color:#ffd700;
transform:translateY(-2px);
}

</style>
</head>
<body>

<!-- NAV -->

<nav>
<div class="logo">
<a href="ni.html"><img src="sa.jpg" alt="Nordluxe Logo"></a>
</div>
<div>
<a href="ni.html">Home</a>
<a href="collections.html">Collection</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="story.html">Story</a>
<a href="cart.html" class="cart-btn">🛒 Cart</a>
</div>
</nav>

<!-- ABOUT -->

<section class="about" data-aos="fade-up">

<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e" data-aos="fade-right" data-aos-delay="200">

<div class="about-text" data-aos="fade-left" data-aos-delay="400">

<h2>About NORDLUXE</h2>

<p>
NORDLUXE is a luxury Scandinavian-inspired fashion house built on minimalism,
timeless design, and premium craftsmanship. Our mission is to create elegant
pieces that blend simplicity with bold identity.
</p>

</div>

</section>

<footer>
<p>© 2026 NORDLUXE</p>
<p><a href="#">Instagram</a></p>
</footer>

<script>

AOS.init({
  duration: 800,
  easing: 'ease-in-out',
  once: true,
  mirror: false
});

</script>

</body>
</html>
