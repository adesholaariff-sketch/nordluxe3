/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(209,155,72,0.3);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 0 30px rgba(209,155,72,0.1);
}

.logo img{
height:45px;
transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
filter:drop-shadow(0 0 10px rgba(209,155,72,0.5));
}

.logo img:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px rgba(209,155,72,0.8));
}

nav a{
color:#e0e0e0;
text-decoration:none;
margin-left:30px;
font-size:15px;
letter-spacing:1px;
font-weight:500;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position:relative;
}

nav a::before{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:linear-gradient(90deg, #d19b48, #ffd700);
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

nav a:hover{
color:#ffd700;
transform:translateY(-2px);
}

nav a:hover::before{
width:100%;
}

.cart-btn{
background:linear-gradient(135deg, #d19b48 0%, #ffd700 100%) !important;
color:#000 !important;
padding:10px 20px !important;
border-radius:25px !important;
font-weight:600 !important;
font-size:14px !important;
letter-spacing:0.5px !important;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
box-shadow:0 4px 15px rgba(209,155,72,0.3) !important;
border:1px solid rgba(255,215,0,0.2) !important;
}

.cart-btn:hover{
background:linear-gradient(135deg, #ffd700 0%, #d19b48 100%) !important;
transform:scale(1.05) translateY(-2px) !important;
box-shadow:0 8px 25px rgba(209,155,72,0.5) !important;
}

.cart-btn{
background:#d19b48 !important;
color:black !important;
padding:8px 15px !important;
border-radius:5px !important;
font-weight:bold !important;
transition:.3s !important;
}

.cart-btn:hover{
background:#b8860b !important;
transform:scale(1.05) !important;
}

/* CHECKOUT */

.checkout-container{
max-width:900px;
margin:100px auto;
padding:0 20px;
}

.checkout-title{
text-align:center;
font-size:36px;
margin-bottom:60px;
color:#fff;
font-weight:700;
text-shadow:0 0 20px rgba(209,155,72,0.3);
position:relative;
}

.checkout-title::after{
content:'';
position:absolute;
bottom:-10px;
left:50%;
transform:translateX(-50%);
width:80px;
height:3px;
background:linear-gradient(90deg, #d19b48, #ffd700);
border-radius:2px;
}

.checkout-form{
background:linear-gradient(135deg, rgba(26,26,46,0.95) 0%, rgba(22,33,62,0.95) 100%);
padding:50px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
border:1px solid rgba(209,155,72,0.2);
backdrop-filter:blur(10px);
}

.form-section{
margin-bottom:50px;
}

.form-section h3{
color:#ffd700;
margin-bottom:25px;
font-size:22px;
font-weight:600;
border-bottom:2px solid #d19b48;
padding-bottom:12px;
text-shadow:0 0 10px rgba(255,215,0,0.5);
}

.form-row{
display:flex;
gap:20px;
margin-bottom:20px;
}

.form-row.single{
display:block;
}

.form-group{
flex:1;
}

.form-group label{
display:block;
margin-bottom:5px;
color:#d19b48;
font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
width:100%;
padding:15px;
background:linear-gradient(135deg, rgba(34,34,34,0.9) 0%, rgba(42,42,42,0.9) 100%);
border:1px solid rgba(209,155,72,0.3);
border-radius:10px;
color:#e0e0e0;
font-size:16px;
font-family:'Montserrat', sans-serif;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
outline:none;
border-color:#ffd700;
box-shadow:0 0 20px rgba(209,155,72,0.4);
background:linear-gradient(135deg, rgba(42,42,42,0.9) 0%, rgba(34,34,34,0.9) 100%);
transform:translateY(-2px);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
outline:none;
border-color:#fff;
box-shadow:0 0 10px rgba(209,155,72,0.3);
}

.checkout-btn{
width:100%;
padding:18px;
background:linear-gradient(135deg, #d19b48 0%, #ffd700 100%);
border:1px solid rgba(255,215,0,0.2);
color:#000;
font-size:18px;
font-weight:600;
border-radius:30px;
cursor:pointer;
transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow:0 8px 25px rgba(209,155,72,0.4);
margin-top:40px;
position:relative;
overflow:hidden;
}

.checkout-btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
transition:all 0.5s;
}

.checkout-btn:hover{
background:linear-gradient(135deg, #ffd700 0%, #d19b48 100%);
transform:scale(1.02) translateY(-3px);
box-shadow:0 12px 35px rgba(209,155,72,0.6);
}

.checkout-btn:hover::before{
left:100%;
}

.cart-empty{
text-align:center;
padding:100px 20px;
color:#888;

.cart-empty h2{

.cart-items-list{

.cart-item{

<script>

// Initialize AOS
AOS.init({
  duration: 800,
  easing: 'ease-in-out',
  once: true,
  mirror: false
});

// Simple cart management (in a real app, this would use localStorage or a backend)
let cartItems = JSON.parse(localStorage.getItem('nordluxeCart') || '[]');

function addToCart(productName, price) {
cartItems.push({name: productName, price: price});
localStorage.setItem('nordluxeCart', JSON.stringify(cartItems));
updateCartDisplay();
}

function updateCartDisplay() {
const cartContainer = document.getElementById('cart-items');

if (cartItems.length === 0) {
cartContainer.innerHTML = `
<p class="cart-empty">
<h2>Your cart is empty</h2>
Add some items from our collection to get started!
</p>
`;
} else {
let cartHTML = '<div class="cart-items-list">';
let total = 0;

cartItems.forEach((item, index) => {
const price = parseFloat(item.price.replace('$', ''));
cartHTML += `
<div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #333; margin-bottom: 10px;">
<div>
<strong>${item.name}</strong><br>
<span style="color: #d19b48;">${item.price}</span>
</div>
<button onclick="removeFromCart(${index})" style="background: #d19b48; color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Remove</button>
</div>
`;
total += price;
});

cartHTML += `<div class="cart-total" style="text-align: right; font-size: 20px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #d19b48;"><strong>Total: $${total.toFixed(2)}</strong></div></div>`;
cartContainer.innerHTML = cartHTML;
}
}

function removeFromCart(index) {
cartItems.splice(index, 1);
localStorage.setItem('nordluxeCart', JSON.stringify(cartItems));
updateCartDisplay();
}

function processOrder() {
// Get form values
const firstName = document.getElementById('firstName').value;
const lastName = document.getElementById('lastName').value;
const email = document.getElementById('email').value;
const phone = document.getElementById('phone').value;
const address = document.getElementById('address').value;
const city = document.getElementById('city').value;
const zipCode = document.getElementById('zipCode').value;
const country = document.getElementById('country').value;

// Basic validation
if (!firstName || !lastName || !email || !address || !city || !zipCode || !country) {
alert('Please fill in all required fields marked with *');
return;
}

if (cartItems.length === 0) {
alert('Your cart is empty. Please add some items before checkout.');
return;
}

// Simulate order processing
alert(`Thank you for your order, ${firstName}!

Order Summary:
${cartItems.map(item => `- ${item.name}: ${item.price}`).join('\n')}

We'll send a confirmation email to ${email} shortly.

Your order will be shipped to:
${address}, ${city}, ${zipCode}, ${country}

Thank you for shopping with NORDLUXE!`);

// Clear cart and form
cartItems = [];
updateCartDisplay();
document.querySelector('.checkout-form').reset();
}

// Initialize cart display
updateCartDisplay();

</script>

</body>
</html>
