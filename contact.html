<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat', sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
color:#e0e0e0;
min-height:100vh;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(209,155,72,0.3);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 0 30px rgba(209,155,72,0.1);
}

.logo img{
height:45px;
transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
filter:drop-shadow(0 0 10px rgba(209,155,72,0.5));
}

.logo img:hover{
transform:scale(1.05);
filter:drop-shadow(0 0 20px rgba(209,155,72,0.8));
}

nav a{
color:#e0e0e0;
text-decoration:none;
margin-left:30px;
font-size:15px;
letter-spacing:1px;
font-weight:500;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position:relative;
}

nav a::before{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:linear-gradient(90deg, #d19b48, #ffd700);
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

nav a:hover{
color:#ffd700;
transform:translateY(-2px);
}

nav a:hover::before{
width:100%;
}

.cart-btn{
background:linear-gradient(135deg, #d19b48 0%, #ffd700 100%) !important;
color:#000 !important;
padding:10px 20px !important;
border-radius:25px !important;
font-weight:600 !important;
font-size:14px !important;
letter-spacing:0.5px !important;
transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
box-shadow:0 4px 15px rgba(209,155,72,0.3) !important;
border:1px solid rgba(255,215,0,0.2) !important;
}

.cart-btn:hover{
background:linear-gradient(135deg, #ffd700 0%, #d19b48 100%) !important;
transform:scale(1.05) translateY(-2px) !important;
box-shadow:0 8px 25px rgba(209,155,72,0.5) !important;
}

/* CONTACT */

.contact{
padding:100px 60px;
text-align:center;
background:linear-gradient(135deg, rgba(10,10,10,0.5) 0%, rgba(26,26,46,0.5) 100%);
border-top:1px solid rgba(209,155,72,0.1);
}

.contact h2{
font-size:36px;
margin-bottom:60px;
color:#fff;
font-weight:700;
text-shadow:0 0 20px rgba(209,155,72,0.3);
}

.contact-box {
max-width: 600px;
margin: 0 auto;
background: rgba(26,26,46,0.8);
border: 2px solid rgba(209,155,72,0.5);
border-radius: 20px;
padding: 40px;
box-shadow: 0 0 50px rgba(209,155,72,0.2);
backdrop-filter: blur(10px);
}

.contact p{
margin: 15px 0;
font-size:20px;
color:#e0e0e0;
font-weight:300;
transition:all 0.3s ease;
}

.contact a {
color: #e0e0e0;
text-decoration: none;
transition: all 0.3s ease;
}

.contact a:hover {
color: #ffd700;
transform: translateY(-2px);
}

.contact p:hover{
color:#ffd700;
transform:translateY(-2px);
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
border-top:1px solid rgba(209,155,72,0.3);
}

footer p{
margin-bottom:15px;
color:#e0e0e0;
font-weight:300;
}

footer a{
color:#d19b48;
text-decoration:none;
font-weight:500;
transition:all 0.3s ease;
}

footer a:hover{
color:#ffd700;
transform:translateY(-2px);
}

</style>
</head>
